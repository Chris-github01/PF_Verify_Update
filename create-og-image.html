<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 60px;
      max-width: 1000px;
    }

    .logo {
      font-size: 72px;
      font-weight: 800;
      color: #3b82f6;
      margin-bottom: 20px;
      letter-spacing: -2px;
    }

    .subtitle {
      font-size: 32px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }

    .description {
      font-size: 28px;
      font-weight: 400;
      color: #94a3b8;
      line-height: 1.5;
      max-width: 900px;
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.1);
      border: 2px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 600;
      margin-top: 40px;
      letter-spacing: 0.5px;
    }

    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  <div class="container">
    <div class="logo">VerifyTrade</div>
    <div class="subtitle">Verify+ Passive Fire</div>
    <div class="description">
      Upload passive fire quotes and receive a full audit exposing scope gaps, missing systems, and procurement risk — before award.
    </div>
    <div class="badge">Quote Auditing Platform</div>
  </div>
</body>
</html>
