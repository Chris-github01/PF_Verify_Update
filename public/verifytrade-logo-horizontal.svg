<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E86AB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4F72;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield Shape -->
  <path d="M 40 12
           L 15 22
           L 15 45
           Q 15 60 40 72
           Q 65 60 65 45
           L 65 22
           Z"
        fill="url(#shieldGradient)"
        stroke="#2E86AB"
        stroke-width="1.5"/>

  <!-- White Border Inside Shield -->
  <path d="M 40 16
           L 19 24
           L 19 45
           Q 19 57 40 68
           Q 61 57 61 45
           L 61 24
           Z"
        fill="none"
        stroke="white"
        stroke-width="1"
        opacity="0.3"/>

  <!-- Checkmark -->
  <path d="M 28 42
           L 36 50
           L 53 30"
        stroke="white"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Text: VerifyTrade -->
  <text x="85" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1E293B">
    <tspan fill="#1B4F72">Verify</tspan><tspan fill="#2E86AB">Trade</tspan>
  </text>
</svg>