services:
  - type: web
    name: pdf-parser-ensemble
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt && chmod +x start.sh
    startCommand: ./start.sh
    envVars:
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: ENABLE_MEMORY_OPTIMIZATION
        value: true
