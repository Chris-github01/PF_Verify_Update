services:
  - type: web
    name: pdf-parser-ensemble
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --log-level info
    envVars:
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: ENABLE_MEMORY_OPTIMIZATION
        value: true
