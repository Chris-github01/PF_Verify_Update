services:
  - type: web
    name: pdf-parser-ensemble
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install --no-cache-dir -r requirements-bootstrap.txt
    startCommand: gunicorn app_minimal:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60 --log-level info
    envVars:
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
